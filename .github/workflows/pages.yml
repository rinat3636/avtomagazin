# Сборка → ветка gh-pages (корень сайта). В Settings → Pages: Branch gh-pages, folder / (root).
# Не «main /» — иначе корень без index.html (404). Папка docs/ в репозитории не используется для Pages.
#
# Опционально: secret PAGES_PAT — скрипт выставит источник gh-pages / через API.
# GITHUB_TOKEN POST /pages не вызывает — см. github.com/actions/configure-pages/issues/40
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: SPA fallback (роутер React)
        run: cp dist/index.html dist/404.html

      - name: Отключить Jekyll
        run: touch dist/.nojekyll

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true

  configure-pages:
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Включить Pages (REST API, PAT)
        env:
          PAGES_PAT: ${{ secrets.PAGES_PAT }}
          PAGES_SOURCE_BRANCH: gh-pages
          PAGES_SOURCE_PATH: /
        run: |
          if [ -z "${PAGES_PAT:-}" ]; then
            echo "::notice::Без PAGES_PAT: Settings → Pages → Branch gh-pages, folder / (root)."
            exit 0
          fi
          export GITHUB_TOKEN="$PAGES_PAT"
          node scripts/enable-github-pages.mjs
