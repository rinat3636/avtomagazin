# Сборка → ветка gh-pages → (опционально) включение Pages через REST API с PAT из secrets.
#
# Белый экран: в Settings → Pages часто ошибочно выбрана ветка main. Нужна ветка gh-pages.
# В корне репозитория нет index.html (Vite: папка web/) — при публикации с main не отдаётся dev-шаблон.
#
# 1. Settings → Secrets and variables → Actions → New repository secret
#    Name: PAGES_PAT
#    Value: новый classic PAT с scope «repo» (или fine-grained: Pages + Administration на репо).
#    Не вставляйте токен в код и не в чат.
# 2. После push workflow сам выставит Source: gh-pages / / через API.
#
# GITHUB_TOKEN не может вызвать POST /pages — см. github.com/actions/configure-pages/issues/40
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: SPA fallback (роутер React)
        run: cp dist/index.html dist/404.html

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true

  configure-pages:
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Включить Pages (REST API, PAT из secrets)
        env:
          PAGES_PAT: ${{ secrets.PAGES_PAT }}
        run: |
          if [ -z "${PAGES_PAT:-}" ]; then
            echo "::notice title=PAGES_PAT::Добавьте repository secret PAGES_PAT (PAT с правом repo / Pages+Admin), затем перезапустите workflow."
            exit 0
          fi
          export GITHUB_TOKEN="$PAGES_PAT"
          node scripts/enable-github-pages.mjs
