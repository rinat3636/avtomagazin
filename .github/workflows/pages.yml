# Сборка → папка docs/ на ветке main → (опционально) включение Pages через REST API (PAT в secret PAGES_PAT).
# GitHub Pages: Settings → Pages → Source «Deploy from a branch» → Branch: main → Folder: /docs.
#
# pushes только в docs/ не запускают workflow (избегаем цикла от деплой-бота).
# .nojekyll отключает Jekyll (иначе Vite-ассеты могут ломаться).
#
# GITHUB_TOKEN не может вызвать POST /pages — см. github.com/actions/configure-pages/issues/40
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: SPA fallback (роутер React)
        run: cp dist/index.html dist/404.html

      - name: Отключить Jekyll на Pages
        run: touch dist/.nojekyll

      - name: Опубликовать в main/docs
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: dist
          target-folder: docs
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}

  configure-pages:
    needs: build-and-publish-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Включить Pages (REST API, PAT из secrets)
        env:
          PAGES_PAT: ${{ secrets.PAGES_PAT }}
          PAGES_SOURCE_BRANCH: main
          PAGES_SOURCE_PATH: /docs
        run: |
          if [ -z "${PAGES_PAT:-}" ]; then
            echo "::notice title=PAGES_PAT::Без secret PAGES_PAT включите Pages вручную: main + /docs."
            exit 0
          fi
          export GITHUB_TOKEN="$PAGES_PAT"
          node scripts/enable-github-pages.mjs
