# Публикация через официальный Actions → Pages (артефакт + deploy-pages).
# Важно: один раз вручную — Settings → Pages → Build and deployment → Source: GitHub Actions.
# (Токен workflow не может включить Pages через REST API, см. github.com/actions/configure-pages/issues/40)
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: SPA fallback (роутер React)
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Памятка по первому деплою
        run: |
          {
            echo '### GitHub Pages'
            echo 'Если сайт по адресу `https://<user>.github.io/<repo>/` показывает «нет GitHub Pages», откройте репозиторий → **Settings** → **Pages** → **Build and deployment** → **Source: GitHub Actions**, сохраните и перезапустите workflow (**Actions** → этот workflow → **Run workflow**).'
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
