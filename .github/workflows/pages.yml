# Сборка → (1) слияние dist в корень main — если в Pages выбрано «main /», сайт заработает без смены ветки.
#    Коммит деплоя с [skip ci], чтобы не зациклить workflow.
# (2) ветка gh-pages — если в Pages выбрано «gh-pages /».
#
# PAT PAGES_PAT (опционально): выставляет источник main / через API.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: SPA fallback (роутер React)
        run: cp dist/index.html dist/404.html

      - name: Отключить Jekyll
        run: touch dist/.nojekyll

      - name: Слить dist в корень main (Pages «main /»)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: dist
          clean: false
          commit-message: chore(deploy): static site [skip ci]
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true

  configure-pages:
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Включить Pages через API (PAT → main /)
        env:
          PAGES_PAT: ${{ secrets.PAGES_PAT }}
        run: |
          if [ -z "${PAGES_PAT:-}" ]; then
            echo "::notice::Без PAGES_PAT: при 404 откройте Settings → Pages и выберите main / (root) или gh-pages /."
            exit 0
          fi
          export GITHUB_TOKEN="$PAGES_PAT"
          PAGES_SOURCE_BRANCH=main PAGES_SOURCE_PATH=/ node scripts/enable-github-pages.mjs

  verify-live:
    needs: build-and-publish
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Ждём CDN и проверяем корень сайта
        run: |
          URL="https://rinat3636.github.io/avtomagazin/"
          for i in $(seq 1 20); do
            code=$(curl -sS -o /tmp/ghp_body -w "%{http_code}" "$URL" || true)
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ] && grep -q 'id="app"' /tmp/ghp_body; then
              echo "OK: отдаётся собранное приложение"
              exit 0
            fi
            sleep 15
          done
          echo "::warning::Корень сайта не 200 или нет #app. Включите Pages или добавьте PAGES_PAT."
          exit 1
