# Сборка и публикация в ветку gh-pages.
#
# Один раз вручную (иначе будет 404 «нет GitHub Pages»):
# репозиторий → Settings → Pages → Build and deployment
# → Source: Deploy from a branch → Branch: gh-pages → Folder: / (root) → Save.
#
# Режим «GitHub Actions» + deploy-pages у вас падал: Pages в настройках не был
# переключён на Actions (см. лог job «Deploy to GitHub Pages»).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: SPA fallback (роутер React)
        run: cp dist/index.html dist/404.html

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true

      - name: Напоминание про Settings → Pages
        if: success()
        run: |
          {
            echo '### GitHub Pages'
            echo 'Если сайт **https://rinat3636.github.io/avtomagazin/** показывает, что Pages нет: **Settings** → **Pages** → источник **Deploy from a branch** → ветка **gh-pages** → папка **/** (root). Сохранить.'
          } >> "$GITHUB_STEP_SUMMARY"
