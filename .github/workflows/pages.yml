# Сборка → (1) rsync dist в корень main + git push (для Pages «main /»).
#    Коммиты с меткой [deploy-bot] не запускают этот workflow (см. if у job).
# (2) ветка gh-pages — для Pages «gh-pages /».
#
# PAT PAGES_PAT: выставляет источник main / через API (опционально).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.head_commit && !contains(github.event.head_commit.message, '[deploy-bot]')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: SPA fallback (роутер React)
        run: cp dist/index.html dist/404.html

      - name: Отключить Jekyll
        run: touch dist/.nojekyll

      - name: Слить dist в корень main и запушить
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rsync -a dist/ ./
          # Убрать старые хэшированные бандлы — иначе кэш/CDN может отдавать старый index при смешанном наборе файлов
          if [ -d assets ]; then
            rsync -a --delete dist/assets/ ./assets/
          fi
          git add -f index.html 404.html .nojekyll
          git add -A assets/
          if [ -f favicon.svg ]; then git add -f favicon.svg; fi
          if [ -f icons.svg ]; then git add -f icons.svg; fi
          if [ -f logo.png ]; then git add -f logo.png; fi
          if git diff --staged --quiet; then
            echo "нет изменений статики — пропускаем коммит в main"
          else
            git commit -m "chore(deploy): static site [deploy-bot]"
            git push origin HEAD:main
          fi

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true

  configure-pages:
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Включить Pages через API (PAT → main /)
        env:
          PAGES_PAT: ${{ secrets.PAGES_PAT }}
        run: |
          if [ -z "${PAGES_PAT:-}" ]; then
            echo "::notice::Без PAGES_PAT: Settings → Pages → main / (root) или gh-pages /."
            exit 0
          fi
          export GITHUB_TOKEN="$PAGES_PAT"
          PAGES_SOURCE_BRANCH=main PAGES_SOURCE_PATH=/ node scripts/enable-github-pages.mjs

  verify-live:
    needs: build-and-publish
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Ждём CDN и проверяем корень сайта
        run: |
          URL="https://rinat3636.github.io/avtomagazin/"
          for i in $(seq 1 20); do
            code=$(curl -sS -o /tmp/ghp_body -w "%{http_code}" "$URL" || true)
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ] && grep -q 'id="app"' /tmp/ghp_body; then
              echo "OK: отдаётся собранное приложение"
              exit 0
            fi
            sleep 15
          done
          echo "::warning::Корень сайта не 200 или нет #app."
          exit 1
